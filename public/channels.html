<!DOCTYPE html>
<html>
<head>
	<meta charset="utf8"/>
	<title>Video miam</title>
	<link rel="shortcut icon" href="videomiam.svg" type="image/x-icon" />
	<script src="channels.js" type="module" defer></script>
	<link rel="stylesheet" href="common.css" />
	<link rel="stylesheet" href="channels.css" />
</head>
<body>
<div id="pageBar">
	<a href="videos.html"><img src="videomiam.svg"></a>
	<a id="videoPageButton" class="mainMenuItem" href="videos.html">Home</a>
	<a id="subscriptionPageButton" class="mainMenuItem" href="channels.html" title="Subscriptions">Channels</a>
