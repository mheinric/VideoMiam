<!DOCTYPE html>
<html>
<head>
	<meta charset="utf8"/>
	<title>Video miam</title>
	<link rel="shortcut icon" href="videomiam.svg" type="image/x-icon" />
	<script src="channel.js" type="module" defer></script>
	<link rel="stylesheet" href="common.css" />
	<link rel="stylesheet" href="channel.css" />
</head>
<body>
<div id="pageBar">
	<img src="videomiam.svg">
	<a id="videoPageButton" class="mainMenuItem" href="index.html">Home</a>
	<a id="subscriptionPageButton" class="mainMenuItem" href="channels.html" title="Subscriptions">Channels</a>
	<div id="channelShortcuts"></div>
	<a id="animesPageButton" class="mainMenuItem" href="anime.html" >Animes</a>
</div>
<div id="channelPage" class="page">
	<button id="addChannelButton">Add</button>
	<h1></h1>
	<input id="channelDisplayNewOnly" type="checkbox" autocomplete="off"></input><label for="channelDisplayNewOnly">New videos only</label>
	<div id="channelVideoList">
	</div>
</div>
<div id="addChannelOverlay">
	<div id="addChannelPopup">
		<h3>Add a new channel</h3>
		URL: <input id="addChannelURL" placeholder="ex: https://youtube.com/@MrPhi" autocomplete="off"><br>

		<button id="addChannelAddButton">Add</button> <button id="addChannelCancelButton">Cancel</button>
	</div>
</div>
</body>
</html>
