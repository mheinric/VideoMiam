<!DOCTYPE html>
<html>
<head>
	<meta charset="utf8"/>
	<title>Video miam</title>
	<link rel="shortcut icon" href="videomiam.svg" type="image/x-icon" />
	<link rel="stylesheet" href="common.css" />
	<link rel="stylesheet" href="forms.css" />
</head>
<body>
<div id="loginPage" class="page">
	<form id="loginForm" action="users/login" method="post">
		<h1>Login</h1>
		<label>Email: <input name="email" type="email" required></label>
		<label>Password: <input name="password" type="password" required></label>
		<input type="submit" value="Login">
		<div id="errorMessage" style="color: red;"></div>
		Don't have an account yet? <br> You can <a href="register.html">register here</a>
	</form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // Prevent default form submission

    const form = e.target;
    const formData = new URLSearchParams(new FormData(form));
    const errorElement = document.getElementById('errorMessage');

    try {
        const response = await fetch(form.action, {
            method: form.method,
            body: formData,
			headers: {
				'Content-Type': 'application/x-www-form-urlencoded',
			},
        });

        if (response.status == 200) {
            // Redirect to videos.html on success
            window.location.href = 'videos.html';
        } else {
            // Display error message
            errorElement.textContent = 'Email/Password incorrect';
        }
    } catch (err) {
        errorElement.textContent = 'An error occurred. Please check your connection.';
    }
});
</script>
</body>
</html>
