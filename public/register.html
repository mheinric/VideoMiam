<!DOCTYPE html>
<html>
<head>
	<meta charset="utf8"/>
	<title>Video miam</title>
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
	<link rel="stylesheet" href="common.css" />
	<link rel="stylesheet" href="forms.css" />
</head>
<body>
<div id="pageBar">
	<img width="50" src="favicon.png">
	<a id="videoPageButton" href="index.html">Videos</a>
	<a id="subscriptionPageButton" href="channels.html" title="Subscriptions">Subs</a>
	<a id="animesPageButton" href="anime.html" >Anime</a>
</div>
<div id="registerPage" class="page">
	<form id="registerForm" action="user/register" method="post">
		<h1>Register</h1>
		<label>Email: <input name="email" type="email" required></label>
		<label>Password: <input name="password" type="password" required></label>
		<label>Re-enter password: <input name="password2" type="password" required></label>
		<input type="submit" value="Register">
		<div id="errorMessage" style="color: red;"></div>
	</form>
</div>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // Prevent default form submission

    const form = e.target;
    const formData = new URLSearchParams(new FormData(form));
    const errorElement = document.getElementById('errorMessage');

	if (document.querySelector("#registerForm input[name=\"password\"]").value != document.querySelector("#registerForm input[name=\"password2\"]").value) {
		errorElement.textContent = "Passwords do not match";
	}

    try {
        const response = await fetch(form.action, {
            method: form.method,
            body: formData,
			headers: {
				'Content-Type': 'application/x-www-form-urlencoded',
			},
        });

        if (response.status == 200) {
            // Redirect to index.html on success
            window.location.href = 'index.html';
        } else if (response.status == 209) {
            // Display error message
            errorElement.textContent = 'Account already exists';
        } else {
			errorElement.textContent = 'An error occured';
		}
    } catch (err) {
        errorElement.textContent = 'An error occurred. Please check your connection.';
    }
});
</script>
</body>
</html>
